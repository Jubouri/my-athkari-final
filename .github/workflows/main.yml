name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create Missing Resources
        run: |
          mkdir -p app/src/main/res/values
          echo '<resources><style name="Theme.Material3.DayNight.NoActionBar" parent="Theme.Material3.DayNight"/></resources>' > app/src/main/res/values/themes.xml

      - name: Build APK
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: My-Athkari-App
          path: app/build/outputs/apk/debug/*.apk
